<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BudgetBuddy Group Detail</title>
  <link rel="stylesheet" href="../../shared/styles/variables.css">
  <link rel="stylesheet" href="../../shared/styles/components.css">
  <link rel="stylesheet" href="../../shared/styles/layout.css">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="brand" href="groups.html">BudgetBuddy Groups</a>
      <div class="nav-links"><a href="../dashboard/dashboard.html">Dashboard</a><a href="../profile/profile.html">Profile</a></div>
    </div>
  </nav>
  <main class="page">
    <h1 id="groupTitle">Group</h1>
    <section class="grid">
      <article class="card span-4">
        <div class="card-header"><h3>Add Member</h3></div>
        <div class="card-body">
          <form id="memberForm">
            <div class="field"><label for="memberEmail">Email</label><input id="memberEmail" type="email" required></div>
            <button class="btn-secondary" type="submit">Add</button>
          </form>
        </div>
      </article>
      <article class="card span-4">
        <div class="card-header"><h3>Add Expense</h3></div>
        <div class="card-body">
          <form id="expenseForm">
            <div class="field"><label for="paidBy">Paid by user ID</label><input id="paidBy" type="number" required></div>
            <div class="field"><label for="expenseAmount">Amount</label><input id="expenseAmount" type="number" min="0.01" step="0.01" required></div>
            <div class="field"><label for="expenseCategory">Category</label><input id="expenseCategory" required></div>
            <button class="btn-primary" type="submit">Save</button>
          </form>
        </div>
      </article>
      <article class="card span-4">
        <div class="card-header"><h3>Balances</h3></div>
        <div id="balances" class="card-body"><div class="empty-state">No balances yet.</div></div>
      </article>
      <article class="card span-6">
        <div class="card-header"><h3>Group Members</h3></div>
        <div id="members" class="card-body"></div>
      </article>
      <article class="card span-6">
        <div class="card-header"><h3>Shared Expenses</h3></div>
        <div id="expenses" class="card-body"><div class="empty-state">No expenses yet — add your first one!</div></div>
      </article>
    </section>
  </main>
  <script type="module" src="../../shared/js/auth-guard.js"></script>
  <script type="module" src="group-detail.js"></script>
</body>
</html>
